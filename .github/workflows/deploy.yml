name: Deploy NextMedya Laravel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Bağlan ve Projeyi Dağıt
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Proje dizinine git
            cd /var/www/nextmedya.com

            # 2. Kodun en güncel halini indir
            git pull origin main

            # 3. Composer bağımlılıklarını kur (Artık sudo'ya gerek yok)
            composer install --no-dev --optimize-autoloader

            # 4. Veritabanı göçlerini çalıştır
            php artisan migrate --force

            # 5. TÜM eski önbelleği temizle
            php artisan optimize:clear

            # 6. Yeni ayarları ve rotaları önbelleğe al
            php artisan config:cache
            php artisan route:cache

            echo "Deployment Başarıyla Tamamlandı!"
