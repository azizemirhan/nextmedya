name: Deploy NextMedya Laravel

on:
  push:
    branches:
      - main # Sadece 'main' branch'ine push yapıldığında tetiklenir

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Sunucuya Bağlan ve Projeyi Dağıt
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # Proje dizinine git
            cd /var/www/nextmedya.com

            # Kodun en güncel halini indir
            git pull origin main

            # Composer bağımlılıklarını kur
            composer install --no-dev --optimize-autoloader

            # Veritabanı göçlerini çalıştır (yeni tablolar varsa eklenir)
            php artisan migrate --force

            # Cache'leri temizle ve yeniden oluştur
            php artisan config:cache
            php artisan route:cache

            echo "Deployment Başarıyla Tamamlandı!"
